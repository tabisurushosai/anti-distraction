<!doctype html>
<html lang="ja">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title data-i18n="popup_title">脱注意散漫</title>
    <link rel="stylesheet" href="./popup.css" />
  </head>
  <body>
    <main class="popup" role="main">
      <header class="popup__header">
        <h1 class="popup__title" data-i18n="popup_title">脱注意散漫</h1>
        <span
          id="status-badge"
          class="popup__status popup__status--enabled"
          data-i18n="popup_status_enabled"
          aria-live="polite"
        >有効</span>
      </header>

      <section class="popup__section" aria-labelledby="usage-heading">
        <h2 id="usage-heading" class="popup__section-title" data-i18n="popup_today_usage">
          本日の利用時間
        </h2>
        <p class="popup__metric">
          <span id="today-usage" class="popup__metric-value">--</span>
        </p>
      </section>

      <section class="popup__section" aria-labelledby="remaining-heading">
        <h2 id="remaining-heading" class="popup__section-title" data-i18n="popup_remaining_time">
          残り時間
        </h2>
        <p class="popup__metric">
          <span id="remaining-time" class="popup__metric-value">--</span>
        </p>
      </section>

      <section class="popup__section" aria-labelledby="recent-heading">
        <h2 id="recent-heading" class="popup__section-title" data-i18n="stats_recent_7d">
          直近 7 日
        </h2>
        <ul id="recent-bars" class="popup__bars" role="list" aria-label="recent-days"></ul>
      </section>

      <div class="popup__actions">
        <button
          id="toggle-btn"
          type="button"
          class="popup__btn popup__btn--primary"
          data-i18n="popup_toggle_off"
          data-i18n-aria-label="popup_toggle_off"
        >オフにする</button>
        <button
          id="unblock-btn"
          type="button"
          class="popup__btn popup__btn--secondary"
          data-i18n="popup_unblock_request"
          data-i18n-aria-label="popup_unblock_request"
        >一時解除をリクエスト</button>
        <p
          id="cooldown-text"
          class="popup__cooldown"
          aria-live="polite"
          hidden
        ></p>
      </div>

      <section
        id="premium-section"
        class="popup__premium"
        aria-labelledby="premium-heading"
      >
        <h2
          id="premium-heading"
          class="popup__section-title"
          data-i18n="options_section_premium"
        >Premium</h2>
        <p
          id="premium-status-text"
          class="popup__premium-status"
          aria-live="polite"
        >--</p>
        <p
          id="premium-hint"
          class="popup__premium-hint"
          data-i18n="popup_premium_locked_stats"
          hidden
        >Premium で詳細統計と無制限の対象サイトを開放</p>
        <button
          id="popup-upgrade-btn"
          type="button"
          class="popup__btn popup__btn--secondary"
          data-i18n="popup_upgrade"
          data-i18n-aria-label="popup_upgrade"
          hidden
        >Premium にアップグレード</button>
      </section>

      <nav class="popup__links" aria-label="links">
        <button
          id="open-options-btn"
          type="button"
          class="popup__link"
          data-i18n="popup_open_options"
          data-i18n-aria-label="popup_open_options"
        >設定を開く</button>
        <button
          id="open-stats-btn"
          type="button"
          class="popup__link"
          data-i18n="popup_open_stats"
          data-i18n-aria-label="popup_open_stats"
        >統計を見る</button>
      </nav>
    </main>
    <script type="module" src="./popup.ts"></script>
  </body>
</html>
